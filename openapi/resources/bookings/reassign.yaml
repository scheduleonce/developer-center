bookings--id--reassign:
  post:
    tags:
      - Bookings
    summary: Reassign a booking
    description: |
      Reassign an existing booking to a new host by ID.

      Effects of reassignment:
      - The original calendar event is deleted, and a new event is created in the new host's integrated calendar.
      - Reassignment notifications are sent to guests and hosts.

    operationId: reassign-booking
    parameters:
      - name: id
        in: path
        description: The unique ID of the booking.
        schema:
          type: string
        required: true
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              new_host:
                type: string
                description: The OnceHub user ID for the new host. The user must belong to the same account, hold an active seat license, and cannot be the current host of the booking.
              location:
                type: object
                description: |
                  Optional. Controls the video conferencing service for the reassigned meeting.

                  - Omit this object to use the new host's default settings or original location if no default settings exist. The meeting will keep its existing physical location, or virtual link.
                  - Include this object to set or change the video conferencing service. This converts the meeting to virtual and overrides any existing provider.

                properties:
                  type:
                    type: string
                    enum: [virtual]
                    description: |
                      The required location type for virtual conferencing.
                  value:
                    type: string
                    description: |
                      The specific video conferencing service to be used.

                      **IMPORTANT :**
                      The selected video conferencing service must be connected and active in the new host's OnceHub account. If the video conferencing service is not connected, the reassignment will fail.
                    enum:
                      [google_meet, microsoft_teams, webex, gotomeeting, zoom]
                required:
                  - type
                  - value
            required:
              - new_host
    responses:
      "401":
        $ref: "../../components/responses/errors.yaml#/Unauthorized"
      "429":
        $ref: "../../components/responses/errors.yaml#/TooManyRequests"
      "200":
        description: "200"
        content:
          application/json:
            schema:
              $ref: "../../components/schemas/booking.yaml#/Booking"
      "404":
        description: "404"
        content:
          application/json:
            examples:
              BookingNotFound:
                value:
                  type: invalid_request_error
                  message: "No such booking: '123'"
                  param: id
              UserNotFound:
                value:
                  type: invalid_request_error
                  message: "No such user: 'USR-XXXXXXXXXX'"
                  param: new_host
            schema:
              $ref: "../../components/schemas/common.yaml#/Error"
      "409":
        description: "409"
        content:
          application/json:
            examples:
              UserInactive:
                value:
                  type: invalid_request_error
                  message: "User is inactive."
                  param: new_host
              PlanRestriction:
                value:
                  type: invalid_request_error
                  message: "Reassign is available on the Route plan and above."
              SameHost:
                value:
                  type: invalid_request_error
                  message: "Booking cannot be reassigned to the same host."
                  param: new_host
              BookingsStatus:
                value:
                  type: invalid_request_error
                  message: "Booking cannot be reassigned in its current status."
                  param: id
              InvalidLocation:
                value:
                  type: invalid_request_error
                  message: "Invalid location: 'Webex' is not connected for this user. Connected video conferencing options: google_meet, microsoft_teams."
                  param: location.value
              HostSeat:
                value:
                  type: invalid_request_error
                  message: "Cannot reassign booking: The new host requires an assigned seat."
            schema:
              $ref: "../../components/schemas/common.yaml#/Error"
    deprecated: false
