bookings--id--reassign:
  patch:
    tags:
      - Bookings
    summary: Reassign a booking
    description: Reassign a booking to a new host by ID
    operationId: reassign-booking
    parameters:
      - name: id
        in: path
        description: ID of the booking
        schema:
          type: string
        required: true
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              new_host:
                type: string
                description: "The unique identifier (ID) of the OnceHub user receiving the reassignment. The user must belong to the same account, hold an active seat license, and cannot be the current host of the booking."
              conferencing_type:
                type: string
                description: "The video conferencing method for the reassigned booking. The selected service must be integrated and connected by the new host. Supported values are google_meet, microsoft_teams, gotomeeting, webex, or zoom."
            required:
              - new_host
    responses:
      "200":
        description: "200"
        content:
          application/json:
            schema:
              $ref: "../../components/schemas/booking.yaml#/Booking"
      "401":
        $ref: "../../components/responses/errors.yaml#/Unauthorized"
      "404":
        description: "404"
        content:
          application/json:
            examples:
              Result:
                value:
                  type: invalid_request_error
                  message: "No such booking: '123'"
                  param: id
            schema:
              $ref: "../../components/schemas/common.yaml#/Error"
      "409":
        description: "409"
        content:
          application/json:
            examples:
              Result:
                value:
                  type: invalid_request_error
                  message: "Booking cannot be reassigned"
            schema:
              $ref: "../../components/schemas/common.yaml#/Error"
      "429":
        $ref: "../../components/responses/errors.yaml#/TooManyRequests"
